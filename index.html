<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Todo</title>
</head>

<body>
    <div class="card">
        <header>
            <h1>TaskFlow</h1>
            <p>Organize your day, one task at a time.</p>
        </header>
        <main>
            <section id="add-task">
                <form id="task-form">
                    <input type="text" class="add-input" id="add-task-input" placeholder="Add a new task..." required>
                    <button type="submit" id="add-btn">+</button>
                </form>
            </section>
            <section id="filter-buttons">
                <button class="active">All</button>
                <button>Active</button>
                <button>Completed</button>
            </section>
            <section id="task-list">
                <ul id="task-container">
                    <li>
                        <input type="checkbox">
                        <span>Learn JavaScript DOM</span>
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </li>

                    <li>
                        <input type="checkbox">
                        <span>Build Portfolio Website</span>
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </li>

                    <li>
                        <input type="checkbox">
                        <span>Solve LeetCode Problems</span>
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </li>
                </ul>

                <p id="task-count">3 tasks remaining</p>
            </section>
        </main>
    </div>
    <footer>
        <script src="script.js"></script>
    </footer>
</body>

</html>
